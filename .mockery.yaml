template: testify
template-data:
  unroll-variadic: true
force-file-write: true
all: true
packages:
  github.com/allora-network/allora-sdk-go:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "mocks.go"
      pkgname: "mocks"
      structname: "{{.Mock}}{{.InterfaceName}}"
  github.com/allora-network/allora-sdk-go/txsend:
    config:
      dir: "txsend/mocks"
      filename: "mocks.go"
      pkgname: "mocks"
      structname: "{{.Mock}}{{.InterfaceName}}"

